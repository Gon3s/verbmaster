      { group: "L", fr: "creuser",       inf: "DIG",        pret: "DUG",        pp: "DUG"        },
      { group: "L", fr: "gâcher",        inf: "SPOIL",      pret: "SPOILT",     pp: "SPOILT"     },
      { group: "M", fr: "devenir",       inf: "BECOME",     pret: "BECAME",     pp: "BECOME"     },
      { group: "M", fr: "s'allonger",    inf: "LIE",        pret: "LAY",        pp: "LAIN"       },
      { group: "M", fr: "courir",        inf: "RUN",        pret: "RAN",        pp: "RUN"        },
      { group: "M", fr: "montrer",       inf: "SHOW",       pret: "SHOWED",     pp: "SHOWN"      },
    ];

    const GROUP_LABELS = {
      A:"⭐ Verbes essentiels", B:"👁️ Perception", C:"🔄 Sans changement",
      D:"🔤 Aiment le T", E:"🔁 I→A→U", G:"💨 -EW / -AWN",
      H:"💡 -GHT", I:"/iː/ → /e/", J:"📖 -EAR→-ORE→-ORN",
      K:"🔚 Terminaisons -EN", L:"✌️ Prétérit = PP", M:"🎲 Divers",
    };
    const GROUP_COLORS = {
      A:"#FF6B6B", B:"#FF9F43", C:"#48DBFB", D:"#1DD1A1",
      E:"#A29BFE", G:"#FD79A8", H:"#FDCB6E", I:"#6C5CE7",
      J:"#00B894", K:"#E17055", L:"#74B9FF", M:"#55EFC4",
    };
    const FILL_MODES = [
      { id:"random", label:"🎲 Aléatoire",            clueField:null   },
      { id:"fr",     label:"🇫🇷 Depuis Français",      clueField:"fr"   },
      { id:"inf",    label:"🔤 Depuis Infinitif",      clueField:"inf"  },
      { id:"pret",   label:"⏮️ Depuis Prétérit",      clueField:"pret" },
      { id:"pp",     label:"📌 Depuis PP",             clueField:"pp"   },
    ];
    const BLANK_FIELDS = { fr:["inf","pret","pp"], inf:["pret","pp"], pret:["inf","pp"], pp:["inf","pret"] };
    const FIELD_LABELS  = { fr:"🇫🇷 Français", inf:"Infinitif", pret:"Prétérit", pp:"Past Participle" };
    const FIELD_COLORS  = { fr:"#fffffe", inf:"#A29BFE", pret:"#FDCB6E", pp:"#48DBFB" };

    function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

    function getWrongAnswers(correct, field, allVerbs, count, sameGroup) {
      const samePool = sameGroup
        ? [...new Set(allVerbs.filter(v => v.group===sameGroup && v[field]!==correct).map(v=>v[field]))]
        : [];
      const otherPool = [...new Set(allVerbs.filter(v => v[field]!==correct).map(v=>v[field]))];
      const combined = [...shuffle(samePool), ...shuffle(otherPool).filter(x=>!samePool.includes(x))];
      const result=[]; const seen=new Set();
      for(const x of combined){if(!seen.has(x)){seen.add(x);result.push(x);}if(result.length===count)break;}
      return result;
    }

    function buildQuizQuestions(verbs) {
      const pool = shuffle(verbs).slice(0, Math.min(20, verbs.length));
      return pool.map((v, i) => {
        const r = i % 4;
        if (r===0) { const c=v.inf; return {type:"reverse", verb:v, correct:c, options:shuffle([c,...getWrongAnswers(c,"inf",verbs,3,v.group)])}; }
        if (r===1) { const c=v.inf; return {type:"fr_only", verb:v, correct:c, options:shuffle([c,...getWrongAnswers(c,"inf",verbs,3,v.group)])}; }
        if (r===2) { const c=`${v.pret} / ${v.pp}`; const w=shuffle(verbs.filter(x=>x.inf!==v.inf)).slice(0,3).map(x=>`${x.pret} / ${x.pp}`); return {type:"pair",verb:v,correct:c,options:shuffle([c,...w])}; }
        const f=Math.random()<.5?"pret":"pp"; const c=v[f];
        return {type:"forward",verb:v,field:f,correct:c,options:shuffle([c,...getWrongAnswers(c,f,verbs,3,v.group)])};
      });
    }

    // ── APP ROOT ──
    function App() {
      const [tab, setTab] = useState("quiz");
      const [selGroups, setSelGroups] = useState(Object.keys(GROUP_LABELS));
      const [errors, setErrors] = useState([]);
      const filtered = VERBS.filter(v => selGroups.includes(v.group));
      const addError = useCallback(e => setErrors(p=>[...p,{...e,id:Date.now()+Math.random()}]),[]);
      const toggleGroup = g => setSelGroups(p => p.includes(g) ? (p.length>1?p.filter(x=>x!==g):p) : [...p,g]);
      const showFilter = !["table","errors"].includes(tab);
      return (
        <div className="app">
          <div className="logo">🇬🇧 VerbMaster</div>
          <div className="subtitle">Verbes irréguliers · 4ème</div>
          <div className="tabs">
            {[["quiz","🎯 QCM"],["fill","✏️ Compléter"],["flash","🃏 Flashcards"],["table","📋 Tableau"]].map(([id,lbl])=>(
              <button key={id} className={`tab${tab===id?" active":""}`} onClick={()=>setTab(id)}>{lbl}</button>
            ))}
            <button className={`tab${tab==="errors"?" err-active":""}`} onClick={()=>setTab("errors")}>
              ❌ Erreurs
              {errors.length>0 && <span className="err-badge">{errors.length>99?"99+":errors.length}</span>}
            </button>
          </div>
          {showFilter && (
            <div className="gfilter">
              <button className="btn btn-secondary" style={{fontSize:12,padding:"6px 14px"}} onClick={()=>setSelGroups(Object.keys(GROUP_LABELS))}>Tout</button>
              {Object.entries(GROUP_LABELS).map(([g,lbl])=>(
                <button key={g} className={`gbtn${selGroups.includes(g)?" sel":""}`}
                  style={{background:selGroups.includes(g)?GROUP_COLORS[g]+"33":"#1e1e2e",borderColor:GROUP_COLORS[g],color:selGroups.includes(g)?GROUP_COLORS[g]:"#a8a8b3"}}
                  onClick={()=>toggleGroup(g)}>{lbl}</button>
              ))}
            </div>
          )}
          {tab==="flash"  && <FlashCards verbs={filtered}/>}
          {tab==="quiz"   && <Quiz verbs={filtered} addError={addError}/>}
          {tab==="fill"   && <FillBlank verbs={filtered} addError={addError}/>}
          {tab==="table"  && <TableView/>}
          {tab==="errors" && <Errors errors={errors} onClear={()=>setErrors([])}/>}
        </div>
      );
    }

    // ── FLASHCARDS ──
    function FlashCards({verbs}) {
      const [deck,setDeck]=useState(()=>shuffle(verbs));
      const [idx,setIdx]=useState(0);
      const [rev,setRev]=useState(false);
      useEffect(()=>{setDeck(shuffle(verbs));setIdx(0);setRev(false);},[verbs]);
      const card=deck[idx];
      if(!card) return <p style={{textAlign:"center",color:"#a8a8b3"}}>Aucun verbe.</p>;
      return (
        <div className="fc-wrap">
          <p style={{textAlign:"center",fontSize:12,color:"#a8a8b3",marginBottom:16}}>{idx+1} / {deck.length}</p>
          <div className="pbar-wrap"><div className="pbar-fill" style={{width:`${((idx+1)/deck.length)*100}%`}}/></div>
          <div className="fc-card" onClick={()=>setRev(r=>!r)}>
            <span className="fc-badge" style={{background:GROUP_COLORS[card.group]+"22",color:GROUP_COLORS[card.group]}}>Groupe {card.group}</span>
            <div className="fc-fr">{card.fr}</div>
            <div className="fc-inf" style={{color:GROUP_COLORS[card.group]}}>{card.inf}</div>
            {!rev && <div className="fc-hint">👆 Clique pour révéler</div>}
            {rev && <div className="ans-row">
              <div className="ans-box"><div className="ans-lbl">Prétérit</div><div className="ans-val" style={{color:"#FDCB6E"}}>{card.pret}</div></div>
              <div className="ans-box"><div className="ans-lbl">Past Participle</div><div className="ans-val" style={{color:"#48DBFB"}}>{card.pp}</div></div>
            </div>}
          </div>
          <div className="fc-ctrls">
            <button className="btn btn-secondary" onClick={()=>{setIdx(i=>(i-1+deck.length)%deck.length);setRev(false);}}>← Préc.</button>
            <button className="btn btn-primary" onClick={()=>{setIdx(i=>(i+1)%deck.length);setRev(false);}}>Suiv. →</button>
          </div>
        </div>
      );
    }

    // ── QUIZ ──
    function Quiz({verbs,addError}) {
      const [questions,setQuestions]=useState([]);
      const [qi,setQi]=useState(0);
      const [selected,setSelected]=useState(null);
      const [score,setScore]=useState(0);
      const [done,setDone]=useState(false);
      const [streak,setStreak]=useState(0);
      const [best,setBest]=useState(0);
      const reset=useCallback(()=>{setQuestions(buildQuizQuestions(verbs));setQi(0);setSelected(null);setScore(0);setDone(false);setStreak(0);setBest(0);},[verbs]);
      useEffect(()=>{reset();},[reset]);
      if(!questions.length) return null;
      if(done){
        const pct=Math.round((score/questions.length)*100);
        const emoji=pct>=90?"🏆":pct>=70?"🌟":pct>=50?"💪":"📚";
        const msg=pct>=90?"Excellent !":pct>=70?"Très bien !":pct>=50?"Pas mal !":"Continue !";
        return(<div className="res-card"><div className="res-emoji">{emoji}</div><div className="res-title">{msg}</div><div className="res-score">{score}/{questions.length}</div><div className="res-sub">{pct}% · Meilleure série : {best} 🔥</div><button className="btn btn-primary" onClick={reset}>🔄 Rejouer</button></div>);
      }
      const q=questions[qi];
      const CFGS={
        forward:{clue:<><div className="q-fr">{q.verb.fr}</div><div className="q-inf" style={{color:GROUP_COLORS[q.verb.group]}}>{q.verb.inf}</div></>,asking:`→ Quel est le ${q.field==="pret"?"PRÉTÉRIT":"PAST PARTICIPLE"} ?`,badge:{label:q.field==="pret"?"PRÉTÉRIT":"PAST PARTICIPLE",color:q.field==="pret"?"#FDCB6E":"#48DBFB"}},
        reverse:{clue:<><div className="q-fr">Prétérit :</div><div className="q-inf" style={{color:"#FDCB6E"}}>{q.verb.pret}</div></>,asking:"→ Quel est l'INFINITIF ?",badge:{label:"REVERSE 🔄",color:"#FF6B6B"}},
        fr_only:{clue:<div className="q-fr" style={{fontSize:18,color:"#fffffe",fontWeight:800}}>🇫🇷 « {q.verb.fr} »</div>,asking:"→ Quel est l'INFINITIF anglais ?",badge:{label:"FRANÇAIS SEULEMENT",color:"#FF9F43"}},
        pair:{clue:<><div className="q-fr">{q.verb.fr}</div><div className="q-inf" style={{color:GROUP_COLORS[q.verb.group]}}>{q.verb.inf}</div></>,asking:"→ Bonne paire PRÉTÉRIT / PAST PARTICIPLE ?",badge:{label:"PAIRE 🎯",color:"#A29BFE"}},
      };
      const cfg=CFGS[q.type];
      const choose=opt=>{
        if(selected!==null) return;
        setSelected(opt);
        const ok=opt===q.correct;
        if(ok){setScore(s=>s+1);const ns=streak+1;setStreak(ns);setBest(b=>Math.max(b,ns));}
        else{setStreak(0);addError({verb:q.verb,source:"quiz",field:q.field||null,given:opt,expected:q.correct});}
        setTimeout(()=>{if(qi+1>=questions.length)setDone(true);else{setQi(i=>i+1);setSelected(null);}},1100);
      };
      return(
        <div className="qwrap">
          <div className="score-bar">
            <div><div className="sc-num" style={{color:"#1DD1A1"}}>{score}</div><div className="sc-lbl">✅ Correct</div></div>
            <div><div className="sc-num" style={{color:"#FDCB6E"}}>{streak} 🔥</div><div className="sc-lbl">Série</div></div>
            <div><div className="sc-num" style={{color:"#a8a8b3"}}>{qi+1}/{questions.length}</div><div className="sc-lbl">Question</div></div>
          </div>
          <div className="pbar-wrap" style={{marginBottom:16}}><div className="pbar-fill" style={{width:`${(qi/questions.length)*100}%`}}/></div>
          <div className="qbox">
            <span className="q-badge" style={{background:cfg.badge.color+"22",color:cfg.badge.color}}>{cfg.badge.label}</span>
            {cfg.clue}
            <div className="q-ask">{cfg.asking}</div>
          </div>
          <div className={`opts${q.type==="pair"?" single-col":""}`}>
            {q.options.map(opt=>{
              let cls="opt";
              if(selected!==null){if(opt===q.correct)cls+=" opt-ok";else if(opt===selected)cls+=" opt-bad";}
              return <button key={opt} className={cls} onClick={()=>choose(opt)} disabled={selected!==null} style={q.type==="pair"?{fontSize:17}:{}}>{opt}</button>;
            })}
          </div>
        </div>
      );
    }

    // ── FILL IN THE BLANK ──
    function FillBlank({verbs,addError}) {
      const [modeId,setModeId]=useState("random");
      const [deck,setDeck]=useState([]);
      const [qi,setQi]=useState(0);
      const [inputs,setInputs]=useState({});
      const [feedback,setFeedback]=useState(null);
      const [score,setScore]=useState(0);
      const [done,setDone]=useState(false);
      const buildDeck=useCallback(()=>{
        const clueFields=["fr","inf","pret","pp"];
        const d=shuffle(verbs).slice(0,Math.min(15,verbs.length)).map(v=>{
          const clue=modeId==="random"?clueFields[Math.floor(Math.random()*4)]:FILL_MODES.find(m=>m.id===modeId).clueField;
          const blanks=BLANK_FIELDS[clue]; const emptyInputs={};
          blanks.forEach(f=>{emptyInputs[f]="";});
          return {verb:v,clue,blanks,emptyInputs};
        });
        setDeck(d);setQi(0);setInputs(d[0]?{...d[0].emptyInputs}:{});setFeedback(null);setScore(0);setDone(false);
      },[verbs,modeId]);
      useEffect(()=>{buildDeck();},[buildDeck]);
      const card=deck[qi]; const TOTAL=deck.length;
      const norm=s=>s.trim().toUpperCase().replace(/\s+/g," ");
      const check=()=>{
        if(feedback||!card) return;
        const results={}; let allOk=true;
        card.blanks.forEach(f=>{const ok=norm(inputs[f]||"")===norm(card.verb[f]);results[f]=ok;if(!ok)allOk=false;});
        if(!allOk) card.blanks.forEach(f=>{if(!results[f])addError({verb:card.verb,source:"fill",field:f,given:inputs[f]||"(vide)",expected:card.verb[f]});});
        if(allOk)setScore(s=>s+1);
        setFeedback({ok:allOk,results});
      };
      const next=()=>{
        if(qi+1>=TOTAL){setDone(true);return;}
        const ni=qi+1;setQi(ni);setInputs({...deck[ni].emptyInputs});setFeedback(null);
      };
      if(done||(TOTAL>0&&!card)){
        const pct=Math.round((score/TOTAL)*100);
        return(<div className="res-card"><div className="res-emoji">{pct>=80?"🏆":pct>=60?"🌟":"📚"}</div><div className="res-title">{pct>=80?"Bravo !":pct>=60?"Bien joué !":"Continue !"}</div><div className="res-score">{score}/{TOTAL}</div><div className="res-sub">{pct}% de bonnes réponses</div><button className="btn btn-primary" onClick={buildDeck}>🔄 Recommencer</button></div>);
      }
      if(!card) return null;
      return(
        <div className="qwrap">
          <div className="mode-picker">
            {FILL_MODES.map(m=><button key={m.id} className={`mode-btn${modeId===m.id?" active":""}`} onClick={()=>setModeId(m.id)}>{m.label}</button>)}
          </div>
          <div className="score-bar">
            <div><div className="sc-num" style={{color:"#1DD1A1"}}>{score}</div><div className="sc-lbl">✅ Correct</div></div>
            <div><div className="sc-num" style={{color:"#a8a8b3"}}>{qi+1}/{TOTAL}</div><div className="sc-lbl">Question</div></div>
          </div>
          <div className="pbar-wrap" style={{marginBottom:16}}><div className="pbar-fill" style={{width:`${(qi/TOTAL)*100}%`}}/></div>
          <div className="clue-box" style={{borderLeftColor:FIELD_COLORS[card.clue]}}>
            <div className="clue-lbl">{FIELD_LABELS[card.clue]}</div>
            <div className="clue-val" style={{color:FIELD_COLORS[card.clue]}}>{card.verb[card.clue]}</div>
            {card.clue!=="fr"&&<div style={{fontSize:13,color:"#a8a8b3",marginTop:4}}>{card.verb.fr}</div>}
          </div>
          <div className="ffields">
            {card.blanks.map(f=>{
              const isOk=feedback?feedback.results[f]:null;
              return(
                <div key={f}>
                  <div className="flbl" style={{color:FIELD_COLORS[f]}}>{FIELD_LABELS[f]}</div>
                  <input className={`finput${isOk===true?" f-ok":isOk===false?" f-bad":""}`} value={inputs[f]||""} onChange={e=>setInputs(p=>({...p,[f]:e.target.value}))} placeholder="?" disabled={!!feedback} onKeyDown={e=>{if(e.key==="Enter"){if(!feedback)check();else next();}}}/>
                  {feedback&&isOk===false&&<div className="correct-hint">✓ {card.verb[f]}</div>}
                </div>
              );
            })}
          </div>
          {feedback&&<div className={`fb-msg${feedback.ok?" fb-ok":" fb-bad"}`}>{feedback.ok?"✅ Parfait !":"❌ Pas tout à fait..."}</div>}
          {!feedback?<button className="btn btn-primary" style={{width:"100%"}} onClick={check}>Vérifier</button>:<button className="btn btn-primary" style={{width:"100%"}} onClick={next}>{qi+1>=TOTAL?"Voir les résultats →":"Suivant →"}</button>}
        </div>
      );
    }

    // ── ERRORS ──
    function Errors({errors,onClear}) {
      const byVerb={};
      errors.forEach(e=>{const k=e.verb.inf;if(!byVerb[k])byVerb[k]={verb:e.verb,entries:[]};byVerb[k].entries.push(e);});
      const sorted=Object.values(byVerb).sort((a,b)=>b.entries.length-a.entries.length);
      if(!errors.length) return(<div className="empty"><div className="empty-icon">🎉</div><div style={{fontWeight:700,fontSize:16,marginBottom:8}}>Aucune erreur pour l'instant !</div><div style={{fontSize:14}}>Fais un QCM ou un exercice pour voir ton historique ici.</div></div>);
      return(
        <div className="ewrap">
          <div className="ehdr">
            <div className="etitle">📊 Historique des erreurs</div>
            <button className="btn btn-danger" style={{fontSize:13,padding:"8px 18px"}} onClick={onClear}>🗑️ Effacer tout</button>
          </div>
          <div className="estats">
            <div className="estat"><div className="estat-n" style={{color:"#FF6B6B"}}>{errors.length}</div><div className="estat-l">Total erreurs</div></div>
            <div className="estat"><div className="estat-n" style={{color:"#FDCB6E"}}>{sorted.length}</div><div className="estat-l">Verbes à revoir</div></div>
            <div className="estat" style={{flex:1}}><div className="estat-n" style={{color:"#A29BFE",fontSize:20}}>{sorted[0]?.verb.inf||"—"}</div><div className="estat-l">Le plus difficile</div></div>
          </div>
          {sorted.map(({verb,entries})=>(
            <div key={verb.inf} style={{marginBottom:24}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                <span style={{background:GROUP_COLORS[verb.group]+"22",color:GROUP_COLORS[verb.group],padding:"3px 10px",borderRadius:50,fontSize:11,fontWeight:800}}>Groupe {verb.group}</span>
                <span style={{fontFamily:"'Fredoka One',cursive",fontSize:20,color:GROUP_COLORS[verb.group]}}>{verb.inf}</span>
                <span style={{color:"#a8a8b3",fontSize:13}}>— {verb.fr}</span>
                <span style={{marginLeft:"auto",background:"rgba(255,107,107,.15)",color:"#FF6B6B",fontFamily:"'Fredoka One',cursive",fontSize:18,padding:"2px 12px",borderRadius:50}}>{entries.length}×</span>
              </div>
              <div style={{background:"#1e1e2e",borderRadius:12,padding:"12px 16px",marginBottom:6,display:"flex",gap:20,flexWrap:"wrap",borderLeft:`4px solid ${GROUP_COLORS[verb.group]}`}}>
                {["inf","pret","pp"].map(f=>(<div key={f}><div style={{fontSize:9,textTransform:"uppercase",letterSpacing:1,color:"#a8a8b3",marginBottom:2}}>{FIELD_LABELS[f]}</div><div style={{fontFamily:"'Fredoka One',cursive",fontSize:17,color:FIELD_COLORS[f]}}>{verb[f]}</div></div>))}
              </div>
              {entries.map((e,i)=>(
                <div key={e.id||i} style={{background:"#16162a",borderRadius:10,padding:"8px 16px",marginBottom:4,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <span className={`esrc ${e.source==="quiz"?"esrc-quiz":"esrc-fill"}`}>{e.source==="quiz"?"🎯 QCM":"✏️ Complet."}</span>
                  {e.field&&<span style={{fontSize:12,color:"#a8a8b3"}}>{FIELD_LABELS[e.field]}</span>}
                  <span style={{color:"#FF6B6B",fontFamily:"'Fredoka One',cursive",fontSize:15,textDecoration:"line-through"}}>{e.given}</span>
                  <span style={{color:"#a8a8b3"}}>→</span>
                  <span style={{color:"#1DD1A1",fontFamily:"'Fredoka One',cursive",fontSize:15}}>{e.expected}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      );
    }

    // ── TABLE ──
    function TableView() {
      return(
        <div className="tw">
          {Object.entries(GROUP_LABELS).map(([g,label])=>{
            const gv=VERBS.filter(v=>v.group===g);
            return(
              <div className="gt-sec" key={g}>
                <div className="gt-title" style={{color:GROUP_COLORS[g]}}>
                  <span style={{background:GROUP_COLORS[g]+"22",padding:"2px 12px",borderRadius:50,fontSize:14}}>Groupe {g}</span>{label}
                </div>
                <table className="vtbl">
                  <thead><tr><th>🇫🇷 Français</th><th>Infinitif</th><th>Prétérit</th><th>Past Participle</th></tr></thead>
                  <tbody>{gv.map((v,i)=>(
                    <tr key={i}>
                      <td>{v.fr}</td>
                      <td className="mono" style={{color:GROUP_COLORS[g]}}>{v.inf}</td>
                      <td className="mono" style={{color:"#FDCB6E"}}>{v.pret}</td>
                      <td className="mono" style={{color:"#48DBFB"}}>{v.pp}</td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
            );
          })}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
